<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FungusAmong.us 5000</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <button id="sidebar-toggle" onclick="toggleSidebar()" title="Show panel">&#9776;</button>
    <div id="sidebar">
      <button id="sidebar-minimize" onclick="toggleSidebar()" title="Minimize panel">&minus;</button>
      <h1>FungusAmong.us 5000</h1>
      <div class="meta">
        Run: <span id="run-date">--</span> |
        Algo: <span id="algo-version">--</span>
      </div>

      <div>
        <label style="font-size:12px;color:#888;">Day</label>
        <div class="day-bar" id="day-bar"></div>
      </div>

      <div>
        <label style="font-size:12px;color:#888;">View</label>
        <div class="zoom-bar">
          <button class="zoom-btn active" data-zoom="local" onclick="setZoom('local')">Nearby</button>
          <button class="zoom-btn" data-zoom="basin" onclick="setZoom('basin')">All Sites</button>
        </div>
      </div>

      <div>
        <label style="font-size:12px;color:#888;">Species</label>
        <div class="species-bar" id="species-bar">
          <button class="species-btn active" data-species="morel" onclick="selectSpecies('morel')">
            <span class="species-icon" style="background:#DAA520;">M</span>Morel
          </button>
          <button class="species-btn" data-species="porcini" disabled title="Coming soon">
            <span class="species-icon" style="background:#8B4513;">P</span>Porcini
          </button>
          <button class="species-btn" data-species="matsutake" disabled title="Sep-Nov">
            <span class="species-icon" style="background:#CD853F;">T</span>Matsutake
          </button>
          <button class="species-btn" data-species="chanterelle" disabled title="Jul-Oct">
            <span class="species-icon" style="background:#FF8C00;">C</span>Chanterelle
          </button>
        </div>
      </div>

      <div>
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <label style="font-size:12px;color:#888;">Filter by Score</label>
          <button class="slider-reset" onclick="resetSliders()">Reset</button>
        </div>
        <div class="slider-group" id="slider-group"></div>
      </div>

      <div class="stats" id="stats"></div>

      <div class="legend">
        <div class="legend-item"><div class="legend-diamond" style="background:purple;"></div> 80+ Excellent</div>
        <div class="legend-item"><div class="legend-diamond" style="background:green;"></div> 70-79 Good</div>
        <div class="legend-item"><div class="legend-dot" style="background:orange;"></div> 50-69 Fair</div>
        <div class="legend-item"><div class="legend-dot" style="background:gray;"></div> &lt;50 Hidden</div>
      </div>

      <div style="margin-top:auto;padding-top:12px;border-top:1px solid #0f3460;font-size:10px;color:#3a3a5a;text-align:center;">
        &copy; Claudito 2026
      </div>
    </div>

    <div id="map"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <script src="app.js"></script>
</body>
</html>
